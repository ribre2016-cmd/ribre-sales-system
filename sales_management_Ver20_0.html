<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>売上管理 Ver20.0 OCR自動入力</title>
<style>
body{font-family:sans-serif;background:#f3f4f6;padding:16px}
.panel{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px;border:3px solid #dc2626}
button{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-weight:bold;margin:4px;cursor:pointer}
button.secondary{background:#fff;color:#111;border:1px solid #cbd5e1}
input,select,textarea{padding:10px;border:1px solid #cbd5e1;border-radius:12px;font-weight:bold;margin:4px}
input.long{min-width:330px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
.card{background:#f8fafc;border:1px solid #dbe3ef;border-radius:16px;padding:12px}
.label{font-size:12px;color:#64748b;font-weight:bold}
.value{font-size:24px;font-weight:900}
.list{margin-top:14px;border:1px solid #ddd;border-radius:16px;background:#fff;overflow:auto;max-height:360px}
.row{padding:10px;border-bottom:1px dashed #ddd;font-size:13px;display:flex;justify-content:space-between;gap:10px}
.ok{background:#f0fdf4}.warn{background:#fff7ed}.danger{background:#fef2f2}
.badge{background:#fee2e2;color:#991b1b;border-radius:999px;padding:3px 8px;font-weight:bold;font-size:11px;white-space:nowrap}
.editor{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-top:12px}
.preview{margin-top:12px;padding:12px;border:1px solid #e2e8f0;border-radius:16px;background:#f8fafc}
iframe{width:100%;height:430px;border:1px solid #cbd5e1;border-radius:14px;background:white}
.small{font-size:12px;color:#64748b}
</style>
</head>
<body>

<div class="panel">
<h1>🤖 OCR自動入力 本実装 Ver20.0</h1>

<div>
<input id="apiKey" class="long" type="password" placeholder="OpenAI APIキー">
<button onclick="saveApiKey()">APIキー保存</button>
<button class="secondary" onclick="checkApiKey()">APIキー確認</button>
</div>

<div>
<input id="fileInput" type="file" accept="application/pdf,.pdf,image/*">
<select id="defaultKind">
<option value="auto">AIに判定させる</option>
<option value="purchase">仕入</option>
<option value="sale">売上</option>
<option value="shipping">送料</option>
<option value="expense">経費</option>
</select>
<button onclick="registerEvidence()">証憑登録</button>
<button onclick="runOcr()">OCR自動入力</button>
<button onclick="saveEditedCandidate()">編集内容を保存</button>
<button onclick="exportCsv()">候補CSV出力</button>
</div>

<div class="editor">
<select id="kind">
<option value="purchase">仕入</option>
<option value="sale">売上</option>
<option value="shipping">送料</option>
<option value="expense">経費</option>
</select>
<input id="date" placeholder="日付">
<input id="vendor" placeholder="相手先">
<input id="itemName" placeholder="内容">
<input id="amount" placeholder="金額">
<input id="tax" placeholder="税額">
<input id="invoiceNo" placeholder="伝票番号/請求書番号">
<input id="memo" placeholder="メモ">
</div>

<div class="grid">
<div class="card"><div class="label">APIキー</div><div id="keyStatus" class="value">未設定</div></div>
<div class="card"><div class="label">証憑</div><div id="evidenceCount" class="value">0件</div></div>
<div class="card"><div class="label">候補</div><div id="candidateCount" class="value">0件</div></div>
<div class="card"><div class="label">状態</div><div id="status" class="value">準備OK</div></div>
</div>

<div id="preview" class="preview">PDF/画像を登録するとここに表示されます。</div>
<div id="list" class="list"></div>
</div>

<script>
const MODEL='gpt-4.1-mini';

function evidences(){try{return JSON.parse(localStorage.getItem('ribre_evidences200')||'[]')}catch(e){return []}}
function saveEvidences(arr){localStorage.setItem('ribre_evidences200',JSON.stringify(arr.slice(0,50)));localStorage.setItem('ribre_evidences180',JSON.stringify(arr.slice(0,50)))}
function candidates(){try{return JSON.parse(localStorage.getItem('ribre_ocr_candidates200')||'[]')}catch(e){return []}}
function saveCandidates(arr){localStorage.setItem('ribre_ocr_candidates200',JSON.stringify(arr.slice(0,200)));localStorage.setItem('ribre_ai_candidates180',JSON.stringify(arr.slice(0,200)))}
function set(id,v){document.getElementById(id).textContent=v}
function render(rows){
  document.getElementById('list').innerHTML=rows.map(r=>'<div class="row '+r.cls+'"><span>'+r.msg+'</span><span class="badge">'+r.type+'</span></div>').join('')
}
function refresh(){
  set('keyStatus',localStorage.getItem('ribre_openai_key200')?'保存済':'未設定');
  set('evidenceCount',evidences().length+'件');
  set('candidateCount',candidates().length+'件');
}
function saveApiKey(){
  const key=document.getElementById('apiKey').value.trim();
  if(!key){alert('APIキーを入力してください');return}
  localStorage.setItem('ribre_openai_key200',key);
  localStorage.setItem('ribre_openai_key180',key);
  document.getElementById('apiKey').value='';
  refresh();
  render([{cls:'ok',type:'OK',msg:'APIキーを保存しました'}]);
}
function checkApiKey(){
  const key=localStorage.getItem('ribre_openai_key200')||localStorage.getItem('ribre_openai_key180')||'';
  if(key){localStorage.setItem('ribre_openai_key200',key);render([{cls:'ok',type:'OK',msg:'APIキー保存済みです'}])}
  else render([{cls:'warn',type:'注意',msg:'APIキーが未設定です'}]);
  refresh();
}
function registerEvidence(){
  const file=document.getElementById('fileInput').files[0];
  if(!file){alert('PDFまたは画像を選択してください');return}
  const reader=new FileReader();
  reader.onload=()=>{
    const item={id:'ev_'+Date.now(),fileName:file.name,mime:file.type||'unknown',size:file.size,defaultKind:document.getElementById('defaultKind').value,dataUrl:reader.result,at:new Date().toLocaleString('ja-JP')};
    const arr=evidences();arr.unshift(item);saveEvidences(arr);refresh();preview(item);set('status','登録OK');
    render([{cls:'ok',type:'登録',msg:'証憑を登録しました：'+file.name}]);
  };
  reader.readAsDataURL(file);
}
function preview(item){
  const box=document.getElementById('preview');
  if(!item){box.textContent='PDF/画像を登録するとここに表示されます。';return}
  if(String(item.mime).includes('pdf')||item.fileName.toLowerCase().endsWith('.pdf')) box.innerHTML='<b>PDF：</b>'+item.fileName+'<br><iframe src="'+item.dataUrl+'"></iframe>';
  else if(String(item.mime).startsWith('image/')) box.innerHTML='<b>画像：</b>'+item.fileName+'<br><img src="'+item.dataUrl+'" style="max-width:100%;max-height:520px;border-radius:14px;border:1px solid #cbd5e1;">';
  else box.innerHTML='<b>登録済：</b>'+item.fileName;
}
function extractJson(text){
  let t=String(text||'').trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  try{return JSON.parse(t)}catch(e){}
  const m=t.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0])}catch(e){}}
  return null;
}
function fillEditor(c){
  document.getElementById('kind').value=c.type||'purchase';
  document.getElementById('date').value=c.date||'';
  document.getElementById('vendor').value=c.vendor||'';
  document.getElementById('itemName').value=c.itemName||'';
  document.getElementById('amount').value=c.amount||'';
  document.getElementById('tax').value=c.tax||'';
  document.getElementById('invoiceNo').value=c.invoiceNo||'';
  document.getElementById('memo').value=c.memo||'';
}
function editorCandidate(){
  return {id:'edit_'+Date.now(),type:document.getElementById('kind').value,date:document.getElementById('date').value,vendor:document.getElementById('vendor').value,itemName:document.getElementById('itemName').value,amount:Number(String(document.getElementById('amount').value).replace(/[,円\s]/g,''))||0,tax:Number(String(document.getElementById('tax').value).replace(/[,円\s]/g,''))||0,invoiceNo:document.getElementById('invoiceNo').value,memo:document.getElementById('memo').value,fileName:(evidences()[0]||{}).fileName||'',at:new Date().toLocaleString('ja-JP')}
}
async function uploadOpenAIFile(apiKey, ev){
  const blob=await (await fetch(ev.dataUrl)).blob();
  const fd=new FormData();
  fd.append('purpose','user_data');
  fd.append('file',blob,ev.fileName);
  const res=await fetch('https://api.openai.com/v1/files',{method:'POST',headers:{Authorization:'Bearer '+apiKey},body:fd});
  const data=await res.json();
  if(!res.ok) throw new Error((data.error&&data.error.message)||JSON.stringify(data));
  return data.id;
}
async function runOcr(){
  const key=localStorage.getItem('ribre_openai_key200')||localStorage.getItem('ribre_openai_key180')||'';
  const ev=evidences()[0];
  if(!key){alert('APIキーを保存してください');return}
  if(!ev){alert('先に証憑登録してください');return}
  set('status','OCR中');
  render([{cls:'warn',type:'OCR',msg:'OpenAIで自動入力中です。少し待ってください'}]);

  const prompt=`日本の売上管理・会計OCRです。証憑から必要情報を抽出してください。
必ずJSONだけ返してください。
{
 "date":"YYYY-MM-DD",
 "vendor":"相手先・店舗名・会社名",
 "itemName":"内容・摘要",
 "amount":税込合計金額の数値,
 "tax":消費税額の数値。不明なら0,
 "type":"purchase|sale|shipping|expense",
 "invoiceNo":"請求書番号・伝票番号・管理番号。不明なら空",
 "memo":"補足"
}
判定ルール:
- 仕入、買取、購入、請求書、古物市場は purchase
- 売上、入金、販売、落札は sale
- ヤマト、佐川、日本郵便、送料、運賃は shipping
- その他は expense
ユーザー指定区分: ${ev.defaultKind||'auto'}`;

  try{
    let body;
    if(String(ev.mime).startsWith('image/')){
      body={model:MODEL,input:[{role:'user',content:[{type:'input_text',text:prompt},{type:'input_image',image_url:ev.dataUrl}]}],temperature:0};
    }else{
      const fileId=await uploadOpenAIFile(key, ev);
      body={model:MODEL,input:[{role:'user',content:[{type:'input_text',text:prompt},{type:'input_file',file_id:fileId}]}],temperature:0};
    }
    const res=await fetch('https://api.openai.com/v1/responses',{method:'POST',headers:{Authorization:'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok) throw new Error((data.error&&data.error.message)||JSON.stringify(data));
    let text=data.output_text||'';
    if(!text && data.output){text=data.output.map(o=>(o.content||[]).map(c=>c.text||'').join('\\n')).join('\\n')}
    const parsed=extractJson(text);
    if(!parsed) throw new Error('AI結果をJSONとして解析できません: '+text.slice(0,300));
    const c={id:'ocr_'+Date.now(),type:parsed.type||'purchase',date:parsed.date||'',vendor:parsed.vendor||'',itemName:parsed.itemName||'',amount:Number(parsed.amount||0),tax:Number(parsed.tax||0),invoiceNo:parsed.invoiceNo||'',memo:parsed.memo||'',fileName:ev.fileName,raw:parsed,at:new Date().toLocaleString('ja-JP')};
    const arr=candidates();arr.unshift(c);saveCandidates(arr);fillEditor(c);refresh();set('status','OCR成功');
    render([{cls:'ok',type:'OCR',msg:'自動入力しました'},{cls:'ok',type:'日付',msg:c.date},{cls:'ok',type:'相手先',msg:c.vendor},{cls:'ok',type:'内容',msg:c.itemName},{cls:'ok',type:'金額',msg:c.amount.toLocaleString()+'円'},{cls:'ok',type:'区分',msg:c.type}]);
  }catch(e){
    set('status','OCRエラー');
    render([{cls:'danger',type:'ERROR',msg:e.message}]);
  }
}
function saveEditedCandidate(){
  const c=editorCandidate();
  if(!c.amount && !c.vendor && !c.itemName){alert('編集欄が空です');return}
  const arr=candidates();arr.unshift(c);saveCandidates(arr);refresh();
  render([{cls:'ok',type:'保存',msg:'編集内容を候補に保存しました：'+c.itemName+' / '+c.amount.toLocaleString()+'円'}]);
}
function exportCsv(){
  const rows=[['日時','区分','日付','相手先','内容','金額','税額','番号','ファイル','メモ']];
  candidates().forEach(c=>rows.push([c.at,c.type,c.date,c.vendor,c.itemName,c.amount,c.tax,c.invoiceNo,c.fileName,c.memo]));
  const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\\n');
  const blob=new Blob(['\\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ocr_auto_candidates_Ver20_0.csv';a.click();
}
window.addEventListener('load',()=>{checkApiKey();refresh();render([{cls:'ok',type:'案内',msg:'PDF/画像を登録して「OCR自動入力」を押してください'}])});
</script>
</body>
</html>
