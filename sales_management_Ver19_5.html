<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>売上管理 Ver19.5 PDFアップロード</title>
<style>
body{font-family:sans-serif;background:#f3f4f6;padding:16px}
.panel{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px;border:3px solid #7c3aed}
button{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-weight:bold;margin:4px;cursor:pointer}
input,select{padding:10px;border:1px solid #cbd5e1;border-radius:12px;font-weight:bold;margin:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
.card{background:#f8fafc;border:1px solid #dbe3ef;border-radius:16px;padding:12px}
.label{font-size:12px;color:#64748b;font-weight:bold}
.value{font-size:24px;font-weight:900}
.list{margin-top:14px;border:1px solid #ddd;border-radius:16px;background:#fff;overflow:auto}
.row{padding:10px;border-bottom:1px dashed #ddd;font-size:13px;display:flex;justify-content:space-between;gap:10px}
.ok{background:#f0fdf4}.warn{background:#fff7ed}.danger{background:#fef2f2}
.badge{background:#ede9fe;color:#6d28d9;border-radius:999px;padding:3px 8px;font-weight:bold;font-size:11px;white-space:nowrap}
.preview{margin-top:12px;padding:12px;border:1px solid #e2e8f0;border-radius:16px;background:#f8fafc}
iframe{width:100%;height:500px;border:1px solid #cbd5e1;border-radius:14px;background:white}
</style>
</head>
<body>
<div class="panel">
<h1>📄 PDFアップロード・証憑保管 Ver19.5</h1>
<div>
<input id="pdfFile" type="file" accept="application/pdf,.pdf,image/*">
<select id="docType">
<option value="purchase">仕入</option>
<option value="sale">売上</option>
<option value="shipping">送料</option>
<option value="expense">経費</option>
</select>
<button onclick="registerPdf()">PDF/画像を登録</button>
<button onclick="showList()">登録一覧</button>
<button onclick="openLatest()">最新を確認</button>
<button onclick="deleteLatest()">最新を削除</button>
<button onclick="exportList()">証憑CSV出力</button>
</div>
<div class="grid">
<div class="card"><div class="label">証憑登録数</div><div id="count" class="value">0件</div></div>
<div class="card"><div class="label">最新ファイル</div><div id="latest" class="value">なし</div></div>
<div class="card"><div class="label">種類</div><div id="latestType" class="value">未選択</div></div>
<div class="card"><div class="label">状態</div><div id="status" class="value">準備OK</div></div>
</div>
<div id="preview" class="preview">ここにPDF/画像プレビューが表示されます。</div>
<div id="list" class="list"></div>
</div>
<script>
function evidences(){try{return JSON.parse(localStorage.getItem('ribre_pdf_evidences195')||'[]')}catch(e){return []}}
function saveEvidences(arr){localStorage.setItem('ribre_pdf_evidences195',JSON.stringify(arr.slice(0,100)));localStorage.setItem('ribre_evidences180',JSON.stringify(arr.slice(0,100)))}
function refresh(){const arr=evidences();document.getElementById('count').textContent=arr.length+'件';document.getElementById('latest').textContent=arr[0]?arr[0].fileName:'なし';document.getElementById('latestType').textContent=arr[0]?arr[0].type:'未選択'}
function render(rows){document.getElementById('list').innerHTML=rows.map(r=>'<div class="row '+r.cls+'"><span>'+r.msg+'</span><span class="badge">'+r.type+'</span></div>').join('')}
function registerPdf(){const file=document.getElementById('pdfFile').files[0];const type=document.getElementById('docType').value;if(!file){alert('PDFまたは画像を選択してください');return}const reader=new FileReader();reader.onload=()=>{const arr=evidences();const item={id:'ev_'+Date.now(),fileName:file.name,mime:file.type||'unknown',size:file.size,type:type,dataUrl:reader.result,at:new Date().toLocaleString('ja-JP')};arr.unshift(item);saveEvidences(arr);refresh();document.getElementById('status').textContent='登録OK';preview(item);render([{cls:'ok',type:'登録',msg:'証憑を登録しました：'+file.name}])};reader.readAsDataURL(file)}
function preview(item){const box=document.getElementById('preview');if(!item){box.textContent='表示する証憑がありません';return}if(String(item.mime).includes('pdf')||item.fileName.toLowerCase().endsWith('.pdf')){box.innerHTML='<b>PDFプレビュー：</b> '+item.fileName+'<br><iframe src="'+item.dataUrl+'"></iframe>'}else if(String(item.mime).startsWith('image/')){box.innerHTML='<b>画像プレビュー：</b> '+item.fileName+'<br><img src="'+item.dataUrl+'" style="max-width:100%;max-height:520px;border-radius:14px;border:1px solid #cbd5e1;">'}else{box.innerHTML='<b>登録済：</b> '+item.fileName}}
function showList(){const arr=evidences();if(!arr.length){render([{cls:'warn',type:'INFO',msg:'登録済み証憑はありません'}]);return}render(arr.map((x,i)=>({cls:'ok',type:x.type,msg:(i+1)+'. '+x.fileName+' / '+Math.round((x.size||0)/1024)+'KB / '+x.at})));refresh()}
function openLatest(){const item=evidences()[0];if(!item){alert('登録済み証憑がありません');return}preview(item);render([{cls:'ok',type:'確認',msg:'最新証憑を表示しました：'+item.fileName}])}
function deleteLatest(){const arr=evidences();if(!arr.length){alert('削除する証憑がありません');return}if(!confirm('最新の証憑を削除しますか？'))return;const removed=arr.shift();saveEvidences(arr);refresh();document.getElementById('preview').textContent='ここにPDF/画像プレビューが表示されます。';render([{cls:'warn',type:'削除',msg:'削除しました：'+removed.fileName}])}
function exportList(){const rows=[['日時','区分','ファイル名','種類','サイズKB']];evidences().forEach(x=>rows.push([x.at,x.type,x.fileName,x.mime,Math.round((x.size||0)/1024)]));const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\\n');const blob=new Blob(['\\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='evidence_list_Ver19_5.csv';a.click()}
window.addEventListener('load',()=>{refresh();render([{cls:'ok',type:'案内',msg:'PDFまたは画像を選んで「PDF/画像を登録」を押してください'}])});
</script>
</body>
</html>
