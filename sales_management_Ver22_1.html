<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RIBRE 売上管理 Ver22.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--blue:#2563eb;--green:#059669;--red:#dc2626;--bg:#f3f4f6;--card:#fff;--line:#dbe3ef}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:#0f172a}
header{background:#0f172a;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
header h1{font-size:18px;margin:0}
nav{display:flex;gap:8px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #e5e7eb;padding:10px;position:sticky;top:52px;z-index:9}
nav button{border:1px solid #cbd5e1;background:#fff;border-radius:999px;padding:9px 14px;font-weight:900;cursor:pointer}
nav button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
main{padding:14px;max-width:1400px;margin:auto}
.section{display:none}
.section.active{display:block}
.panel{background:#fff;border-radius:20px;padding:18px;margin-bottom:14px;border:1px solid var(--line);box-shadow:0 10px 24px rgba(15,23,42,.06)}
.panel h2{margin:0 0 12px;font-size:20px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
input,select,textarea{padding:10px;border:1px solid #cbd5e1;border-radius:12px;font-weight:700;min-width:180px}
button{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer}
button.secondary{background:#fff;color:#111;border:1px solid #cbd5e1}
button.green{background:var(--green)}
button.red{background:var(--red)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.card{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:12px}
.label{font-size:12px;color:#64748b;font-weight:900}
.value{font-size:24px;font-weight:950;margin-top:4px;overflow:hidden;text-overflow:ellipsis}
.list{border:1px solid #e2e8f0;border-radius:16px;background:#fff;overflow:auto;max-height:420px;margin-top:12px}
.row{display:flex;justify-content:space-between;gap:10px;padding:10px;border-bottom:1px dashed #e2e8f0;font-size:13px}
.ok{background:#f0fdf4;color:#166534}.warn{background:#fff7ed;color:#9a3412}.danger{background:#fef2f2;color:#991b1b}
.badge{border-radius:999px;background:#dbeafe;color:#1d4ed8;padding:3px 8px;font-size:11px;font-weight:900;white-space:nowrap}
.editor{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-top:10px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}
th,td{border-bottom:1px solid #e5e7eb;padding:8px;font-size:12px;text-align:left}
th{background:#f8fafc;color:#475569}
.preview{margin-top:12px;padding:12px;border:1px solid #e2e8f0;border-radius:16px;background:#f8fafc}
iframe{width:100%;height:430px;border:1px solid #cbd5e1;border-radius:14px;background:white}
.small{font-size:12px;color:#64748b}
</style>
</head>
<body>
<header>
  <h1>株式会社RIBRE 売上管理 Ver22.1</h1>
  <div id="topUser">未ログイン</div>
</header>

<nav>
  <button class="active" onclick="showSec('dash',this)">ダッシュボード</button>
  <button onclick="showSec('settings',this)">設定・ログイン</button>
  <button onclick="showSec('sales',this)">売上管理</button>
  <button onclick="showSec('purchases',this)">仕入管理</button>
  <button onclick="showSec('ocr',this)">OCR・証憑</button>
  <button onclick="showSec('cloud',this)">クラウド保存</button>
</nav>

<main>
<section id="dash" class="section active">
  <div class="panel">
    <h2>📊 ダッシュボード</h2>
    <div class="grid">
      <div class="card"><div class="label">売上件数</div><div id="dashSalesCount" class="value">0件</div></div>
      <div class="card"><div class="label">仕入件数</div><div id="dashPurchaseCount" class="value">0件</div></div>
      <div class="card"><div class="label">売上合計</div><div id="dashSalesTotal" class="value">0円</div></div>
      <div class="card"><div class="label">利益目安</div><div id="dashProfit" class="value">0円</div></div>
    </div>
    <div class="controls">
      <button onclick="refreshAll()">再集計</button>
      <button class="secondary" onclick="monthlySummary()">月別集計</button>
    </div>
    <div id="dashList" class="list"></div>
  </div>
</section>

<section id="settings" class="section">
  <div class="panel">
    <h2>⚙ 設定・ログイン</h2>
    <div class="controls">
      <input id="sbUrl" placeholder="Supabase Project URL">
      <input id="sbKey" placeholder="Publishable key">
      <button onclick="saveSupabase()">Supabase設定保存</button>
      <button class="secondary" onclick="checkSupabase()">接続確認</button>
    </div>
    <div class="controls">
      <input id="email" type="email" placeholder="メールアドレス">
      <input id="password" type="password" placeholder="パスワード">
      <select id="role"><option value="admin">管理者</option><option value="staff">スタッフ</option><option value="viewer">閲覧のみ</option></select>
      <button onclick="signUp()">新規登録</button>
      <button onclick="signIn()">ログイン</button>
      <button class="secondary" onclick="signOut()">ログアウト</button>
    </div>
    <div class="controls">
      <input id="openaiKey" type="password" placeholder="OpenAI APIキー">
      <button onclick="saveOpenAI()">OpenAI APIキー保存</button>
    </div>
    <div class="grid">
      <div class="card"><div class="label">Supabase</div><div id="sbStatus" class="value">未設定</div></div>
      <div class="card"><div class="label">ログイン</div><div id="loginStatus" class="value">未ログイン</div></div>
      <div class="card"><div class="label">ユーザー</div><div id="userView" class="value">未ログイン</div></div>
      <div class="card"><div class="label">OpenAI</div><div id="openaiStatus" class="value">未設定</div></div>
    </div>
    <div id="settingsList" class="list"></div>
  </div>
</section>

<section id="sales" class="section">
  <div class="panel">
    <h2>💰 売上管理</h2>
    <div class="editor">
      <input id="saleDate" placeholder="日付">
      <input id="saleShop" placeholder="販売先">
      <input id="saleName" placeholder="内容">
      <input id="saleAmount" placeholder="金額">
      <input id="saleMemo" placeholder="メモ">
    </div>
    <div class="controls">
      <button onclick="addSale()">売上追加</button>
      <button class="secondary" onclick="exportSalesCsv()">売上CSV</button>
    </div>
    <div id="salesTable"></div>
  </div>
</section>

<section id="purchases" class="section">
  <div class="panel">
    <h2>📦 仕入管理</h2>
    <div class="editor">
      <input id="purDate" placeholder="日付">
      <input id="purVendor" placeholder="仕入先">
      <input id="purName" placeholder="内容">
      <input id="purAmount" placeholder="金額">
      <input id="purMemo" placeholder="メモ">
    </div>
    <div class="controls">
      <button onclick="addPurchase()">仕入追加</button>
      <button class="secondary" onclick="exportPurchasesCsv()">仕入CSV</button>
    </div>
    <div id="purchasesTable"></div>
  </div>
</section>

<section id="ocr" class="section">
  <div class="panel">
    <h2>🤖 OCR・証憑</h2>
    <div class="controls">
      <input id="ocrFile" type="file" accept="application/pdf,.pdf,image/*">
      <select id="ocrKind"><option value="auto">AI判定</option><option value="purchase">仕入</option><option value="sale">売上</option><option value="shipping">送料</option><option value="expense">経費</option></select>
      <button onclick="registerEvidence()">証憑登録</button>
      <button onclick="runOcr()">OCR自動入力</button>
      <button class="secondary" onclick="saveOcrCandidate()">候補保存</button>
    </div>
    <div class="editor">
      <select id="cKind"><option value="purchase">仕入</option><option value="sale">売上</option><option value="shipping">送料</option><option value="expense">経費</option></select>
      <input id="cDate" placeholder="日付">
      <input id="cVendor" placeholder="相手先">
      <input id="cItem" placeholder="内容">
      <input id="cAmount" placeholder="金額">
      <input id="cTax" placeholder="税額">
      <input id="cNo" placeholder="伝票/請求番号">
      <input id="cMemo" placeholder="メモ">
    </div>
    <div class="controls">
      <button class="green" onclick="ocrAutoRegister()">AI区分で自動登録</button>
      <button onclick="ocrToSale()">売上へ登録</button>
      <button onclick="ocrToPurchase()">仕入へ登録</button>
    </div>
    <div id="preview" class="preview">PDF/画像を登録するとここに表示されます。</div>
    <div id="ocrList" class="list"></div>
  </div>
</section>

<section id="cloud" class="section">
  <div class="panel">
    <h2>☁ クラウド保存</h2>
    <div class="controls">
      <button onclick="cloudCheck()">クラウド接続確認</button>
      <button onclick="uploadSales()">売上をクラウド保存</button>
      <button onclick="uploadPurchases()">仕入をクラウド保存</button>
      <button onclick="loadMine()">自分のクラウドデータ読込</button>
      <button class="secondary" onclick="cloudMonthly()">クラウド月別集計</button>
    </div>
    <div class="grid">
      <div class="card"><div class="label">状態</div><div id="cloudStatus" class="value">未確認</div></div>
      <div class="card"><div class="label">最終同期</div><div id="lastSync" class="value">なし</div></div>
      <div class="card"><div class="label">ログイン</div><div id="cloudUser" class="value">未ログイン</div></div>
      <div class="card"><div class="label">RLS</div><div class="value">対応</div></div>
    </div>
    <div id="cloudList" class="list"></div>
  </div>
</section>
</main>

<script>
const LS={
  sales:'ribre_full_sales221',
  purchases:'ribre_full_purchases221',
  ev:'ribre_full_evidences221',
  cand:'ribre_full_candidates221',
  sb:'ribre_supabase_config_v121',
  sess:'ribre_auth_session140',
  openai:'ribre_openai_key200'
};
function yen(n){return (Number(n)||0).toLocaleString()+'円'}
function num(v){const n=Number(String(v??'').replace(/[¥,円,\s]/g,''));return Number.isFinite(n)?n:0}
function today(){return new Date().toISOString().slice(0,10)}
function get(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}
function setLS(k,v){localStorage.setItem(k,JSON.stringify(v))}
function sales(){return get(LS.sales,[])}
function purchases(){return get(LS.purchases,[])}
function evidences(){return get(LS.ev,[])}
function candidates(){return get(LS.cand,[])}
function sb(){return get(LS.sb,{})}
function sess(){return get(LS.sess,{})}
function email(){const s=sess();return s.email||(s.user&&s.user.email)||localStorage.getItem('ribre_current_user140')||''}
function role(){const s=sess();return s.role||localStorage.getItem('ribre_current_role140')||'staff'}
function renderList(id,rows){document.getElementById(id).innerHTML=(rows||[]).map(r=>'<div class="row '+(r.level||'ok')+'"><span>'+r.msg+'</span><span class="badge">'+r.type+'</span></div>').join('')}
function showSec(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');refreshAll()}
function refreshTop(){document.getElementById('topUser').textContent=email()?email()+' / '+role():'未ログイン';document.getElementById('userView').textContent=email()||'未ログイン';document.getElementById('loginStatus').textContent=email()?'ログイン中':'未ログイン';document.getElementById('cloudUser').textContent=email()||'未ログイン';document.getElementById('sbStatus').textContent=sb().url?'設定済':'未設定';document.getElementById('openaiStatus').textContent=(localStorage.getItem(LS.openai)||localStorage.getItem('ribre_openai_key180'))?'保存済':'未設定'}
function refreshAll(){refreshTop();const s=sales(),p=purchases();const st=s.reduce((a,x)=>a+num(x.amount),0);const pt=p.reduce((a,x)=>a+num(x.total||x.amount),0);document.getElementById('dashSalesCount').textContent=s.length+'件';document.getElementById('dashPurchaseCount').textContent=p.length+'件';document.getElementById('dashSalesTotal').textContent=yen(st);document.getElementById('dashProfit').textContent=yen(st-pt);renderSales();renderPurchases()}
function monthlySummary(){const map={};sales().forEach(x=>{const m=x.month||String(x.date||'').slice(0,7)||'未設定';map[m]=map[m]||{s:0,p:0};map[m].s+=num(x.amount)});purchases().forEach(x=>{const m=x.month||String(x.date||'').slice(0,7)||'未設定';map[m]=map[m]||{s:0,p:0};map[m].p+=num(x.total||x.amount)});const rows=Object.keys(map).sort().reverse().map(m=>({type:m,msg:'売上 '+yen(map[m].s)+' / 仕入 '+yen(map[m].p)+' / 利益 '+yen(map[m].s-map[m].p)}));renderList('dashList',rows.length?rows:[{type:'INFO',level:'warn',msg:'データがありません'}])}
function saveSupabase(){const url=document.getElementById('sbUrl').value.trim();const key=document.getElementById('sbKey').value.trim();if(!url||!key){alert('URLとkeyを入れてください');return}setLS(LS.sb,{url,key});refreshAll();renderList('settingsList',[{type:'OK',msg:'Supabase設定を保存しました'}])}
async function checkSupabase(){const r=await rest('sales','?select=id&limit=1');document.getElementById('sbStatus').textContent=r.error?'エラー':'OK';renderList('settingsList',[{type:r.error?'ERROR':'OK',level:r.error?'danger':'ok',msg:r.error?r.error.message:'Supabase接続OK'}])}
function saveOpenAI(){const k=document.getElementById('openaiKey').value.trim();if(!k){alert('APIキーを入れてください');return}localStorage.setItem(LS.openai,k);localStorage.setItem('ribre_openai_key180',k);document.getElementById('openaiKey').value='';refreshAll();renderList('settingsList',[{type:'OK',msg:'OpenAI APIキーを保存しました'}])}
function authBase(path){const c=sb();if(!c.url||!c.key){alert('Supabase設定してください');return null}return c.url.replace(/\/$/,'')+'/auth/v1/'+path}
async function authFetch(path,body){const c=sb();const u=authBase(path);if(!u)return {error:{message:'設定なし'}};try{const res=await fetch(u,{method:'POST',headers:{apikey:c.key,'Content-Type':'application/json'},body:JSON.stringify(body||{})});const text=await res.text();let data=null;try{data=text?JSON.parse(text):null}catch(e){data=text}if(!res.ok)return {error:{message:(data&&data.msg)||(data&&data.message)||text}};return {data}}catch(e){return {error:{message:e.message}}}}
async function signUp(){const e=document.getElementById('email').value.trim(),p=document.getElementById('password').value.trim(),r=document.getElementById('role').value;if(!e||!p){alert('メールとパスワードを入力');return}const res=await authFetch('signup',{email:e,password:p,data:{role:r}});renderList('settingsList',[{type:res.error?'ERROR':'OK',level:res.error?'danger':'ok',msg:res.error?res.error.message:'登録しました。ログインしてください'}])}
async function signIn(){const e=document.getElementById('email').value.trim(),p=document.getElementById('password').value.trim(),r=document.getElementById('role').value;if(!e||!p){alert('メールとパスワードを入力');return}const res=await authFetch('token?grant_type=password',{email:e,password:p});if(res.error){renderList('settingsList',[{type:'ERROR',level:'danger',msg:res.error.message}]);return}const s=res.data||{};s.email=e;s.role=r;setLS(LS.sess,s);localStorage.setItem('ribre_current_user140',e);localStorage.setItem('ribre_current_role140',r);refreshAll();renderList('settingsList',[{type:'OK',msg:'ログインしました：'+e}])}
function signOut(){localStorage.removeItem(LS.sess);localStorage.removeItem('ribre_current_user140');localStorage.removeItem('ribre_current_role140');refreshAll();renderList('settingsList',[{type:'OK',msg:'ログアウトしました'}])}
function renderSales(){const data=sales();document.getElementById('salesTable').innerHTML='<table><tr><th>日付</th><th>販売先</th><th>内容</th><th>金額</th><th>メモ</th></tr>'+data.slice(0,200).map(x=>'<tr><td>'+x.date+'</td><td>'+x.shop+'</td><td>'+x.name+'</td><td>'+yen(x.amount)+'</td><td>'+x.memo+'</td></tr>').join('')+'</table>'}
function renderPurchases(){const data=purchases();document.getElementById('purchasesTable').innerHTML='<table><tr><th>日付</th><th>仕入先</th><th>内容</th><th>金額</th><th>メモ</th></tr>'+data.slice(0,200).map(x=>'<tr><td>'+x.date+'</td><td>'+x.vendor+'</td><td>'+x.name+'</td><td>'+yen(x.total||x.amount)+'</td><td>'+x.memo+'</td></tr>').join('')+'</table>'}
function addSale(){const row={id:'s_'+Date.now(),date:document.getElementById('saleDate').value||today(),month:(document.getElementById('saleDate').value||today()).slice(0,7),shop:document.getElementById('saleShop').value,name:document.getElementById('saleName').value,amount:num(document.getElementById('saleAmount').value),memo:document.getElementById('saleMemo').value,source:'manual'};const a=sales();a.unshift(row);setLS(LS.sales,a);refreshAll()}
function addPurchase(){const row={id:'p_'+Date.now(),date:document.getElementById('purDate').value||today(),month:(document.getElementById('purDate').value||today()).slice(0,7),vendor:document.getElementById('purVendor').value,name:document.getElementById('purName').value,total:num(document.getElementById('purAmount').value),memo:document.getElementById('purMemo').value,source:'manual'};const a=purchases();a.unshift(row);setLS(LS.purchases,a);refreshAll()}
function csvDownload(rows,name){const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}
function exportSalesCsv(){csvDownload([['日付','販売先','内容','金額','メモ'],...sales().map(x=>[x.date,x.shop,x.name,x.amount,x.memo])],'sales_Ver22_1.csv')}
function exportPurchasesCsv(){csvDownload([['日付','仕入先','内容','金額','メモ'],...purchases().map(x=>[x.date,x.vendor,x.name,x.total||x.amount,x.memo])],'purchases_Ver22_1.csv')}
function registerEvidence(){const f=document.getElementById('ocrFile').files[0];if(!f){alert('PDF/画像を選択');return}const rd=new FileReader();rd.onload=()=>{const a=evidences();const it={id:'ev_'+Date.now(),fileName:f.name,mime:f.type||'unknown',kind:document.getElementById('ocrKind').value,dataUrl:rd.result,at:new Date().toLocaleString('ja-JP')};a.unshift(it);setLS(LS.ev,a);localStorage.setItem('ribre_evidences180',JSON.stringify(a));preview(it);renderList('ocrList',[{type:'登録',msg:'証憑を登録しました：'+f.name}])};rd.readAsDataURL(f)}
function preview(it){const box=document.getElementById('preview');if(String(it.mime).includes('pdf')||it.fileName.toLowerCase().endsWith('.pdf'))box.innerHTML='<b>PDF：</b>'+it.fileName+'<br><iframe src="'+it.dataUrl+'"></iframe>';else box.innerHTML='<b>画像：</b>'+it.fileName+'<br><img src="'+it.dataUrl+'" style="max-width:100%;max-height:520px;border-radius:14px;border:1px solid #cbd5e1;">'}
async function uploadOpenAIFile(key,ev){const blob=await(await fetch(ev.dataUrl)).blob();const fd=new FormData();fd.append('purpose','user_data');fd.append('file',blob,ev.fileName);const res=await fetch('https://api.openai.com/v1/files',{method:'POST',headers:{Authorization:'Bearer '+key},body:fd});const d=await res.json();if(!res.ok)throw new Error((d.error&&d.error.message)||JSON.stringify(d));return d.id}
function extractJson(text){let t=String(text||'').trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();try{return JSON.parse(t)}catch(e){}const m=t.match(/\{[\s\S]*\}/);if(m){try{return JSON.parse(m[0])}catch(e){}}return null}
async function runOcr(){const key=localStorage.getItem(LS.openai)||localStorage.getItem('ribre_openai_key180')||'';const ev=evidences()[0];if(!key){alert('OpenAI APIキーを保存');return}if(!ev){alert('証憑登録してください');return}renderList('ocrList',[{type:'OCR',level:'warn',msg:'AI読取中です'}]);const prompt='日本の会計OCRです。JSONのみ返してください。{ "date":"YYYY-MM-DD", "vendor":"相手先", "itemName":"内容", "amount":税込金額数値, "tax":税額数値, "type":"purchase|sale|shipping|expense", "invoiceNo":"番号", "memo":"補足" }';try{let body;if(String(ev.mime).startsWith('image/'))body={model:'gpt-4.1-mini',input:[{role:'user',content:[{type:'input_text',text:prompt},{type:'input_image',image_url:ev.dataUrl}]}],temperature:0};else{const fileId=await uploadOpenAIFile(key,ev);body={model:'gpt-4.1-mini',input:[{role:'user',content:[{type:'input_text',text:prompt},{type:'input_file',file_id:fileId}]}],temperature:0}}const res=await fetch('https://api.openai.com/v1/responses',{method:'POST',headers:{Authorization:'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await res.json();if(!res.ok)throw new Error((d.error&&d.error.message)||JSON.stringify(d));let text=d.output_text||'';if(!text&&d.output)text=d.output.map(o=>(o.content||[]).map(c=>c.text||'').join('\n')).join('\n');const p=extractJson(text);if(!p)throw new Error('JSON解析失敗');fillCandidate(p,ev);renderList('ocrList',[{type:'OCR',msg:'自動入力しました'},{type:'金額',msg:yen(p.amount)}])}catch(e){renderList('ocrList',[{type:'ERROR',level:'danger',msg:e.message}])}}
function fillCandidate(p,ev){document.getElementById('cKind').value=p.type||'purchase';document.getElementById('cDate').value=p.date||today();document.getElementById('cVendor').value=p.vendor||'';document.getElementById('cItem').value=p.itemName||'';document.getElementById('cAmount').value=p.amount||'';document.getElementById('cTax').value=p.tax||'';document.getElementById('cNo').value=p.invoiceNo||'';document.getElementById('cMemo').value=p.memo||'';const a=candidates();a.unshift(readCandidate(ev));setLS(LS.cand,a)}
function readCandidate(ev){return{id:'c_'+Date.now(),type:document.getElementById('cKind').value,date:document.getElementById('cDate').value||today(),vendor:document.getElementById('cVendor').value,itemName:document.getElementById('cItem').value,amount:num(document.getElementById('cAmount').value),tax:num(document.getElementById('cTax').value),invoiceNo:document.getElementById('cNo').value,memo:document.getElementById('cMemo').value,fileName:(ev||evidences()[0]||{}).fileName||'',at:new Date().toLocaleString('ja-JP')}}
function saveOcrCandidate(){const a=candidates();a.unshift(readCandidate());setLS(LS.cand,a);renderList('ocrList',[{type:'保存',msg:'OCR候補を保存しました'}])}
function ocrToSale(){const c=readCandidate();const a=sales();a.unshift({id:'s_'+Date.now(),date:c.date,month:c.date.slice(0,7),shop:c.vendor,name:c.itemName,amount:c.amount,memo:c.memo+' / '+c.fileName,source:'OCR'});setLS(LS.sales,a);refreshAll();renderList('ocrList',[{type:'売上',msg:'売上へ登録しました'}])}
function ocrToPurchase(){const c=readCandidate();const a=purchases();a.unshift({id:'p_'+Date.now(),date:c.date,month:c.date.slice(0,7),vendor:c.vendor,name:c.itemName,total:c.amount,memo:c.memo+' / '+c.fileName,source:'OCR'});setLS(LS.purchases,a);refreshAll();renderList('ocrList',[{type:'仕入',msg:'仕入へ登録しました'}])}
function ocrAutoRegister(){const k=document.getElementById('cKind').value;if(k==='sale')ocrToSale();else ocrToPurchase()}
function restHeaders(){const c=sb(),s=sess();return{apikey:c.key,Authorization:'Bearer '+(s.access_token||c.key),'Content-Type':'application/json',Prefer:'return=representation'}}
function restUrl(t){const c=sb();if(!c.url||!c.key){alert('Supabase設定してください');return null}return c.url.replace(/\/$/,'')+'/rest/v1/'+t}
async function rest(t,opt={}){const u=restUrl(t);if(!u)return{error:{message:'設定なし'}};try{const res=await fetch(u+(opt.query||''),{method:opt.method||'GET',headers:restHeaders(),body:opt.body?JSON.stringify(opt.body):undefined});const text=await res.text();let data=null;try{data=text?JSON.parse(text):null}catch(e){data=text}if(!res.ok)return{error:{message:(data&&data.message)||text||('HTTP '+res.status)}};return{data}}catch(e){return{error:{message:e.message}}}}
async function cloudCheck(){const r=await rest('sales',{query:'?select=id&limit=1'});document.getElementById('cloudStatus').textContent=r.error?'エラー':'OK';renderList('cloudList',[{type:r.error?'ERROR':'OK',level:r.error?'danger':'ok',msg:r.error?r.error.message:'クラウド接続OK'}])}
function mapSale(x){return{user_email:email(),user_role:role(),sale_date:x.date,month:x.month,item_name:x.name,shop:x.shop,amount:num(x.amount),fee:0,shipping:0,profit:num(x.amount),memo:x.memo||''}}
function mapPurchase(x){return{user_email:email(),user_role:role(),purchase_date:x.date,month:x.month,item_name:x.name,vendor:x.vendor,cost:num(x.total),shipping:0,total:num(x.total),memo:x.memo||''}}
async function uploadSales(){if(!email()){alert('ログインしてください');return}const r=await rest('sales',{method:'POST',body:sales().map(mapSale)});afterUpload(r,'売上')}
async function uploadPurchases(){if(!email()){alert('ログインしてください');return}const r=await rest('purchases',{method:'POST',body:purchases().map(mapPurchase)});afterUpload(r,'仕入')}
function afterUpload(r,name){if(r.error){renderList('cloudList',[{type:'ERROR',level:'danger',msg:r.error.message}]);return}localStorage.setItem('ribre_last_sync221',new Date().toLocaleString('ja-JP'));document.getElementById('lastSync').textContent=localStorage.getItem('ribre_last_sync221');renderList('cloudList',[{type:name,msg:name+'をクラウド保存しました'}])}
async function loadMine(){const e=email();if(!e){alert('ログインしてください');return}const s=await rest('sales',{query:'?select=*&user_email=eq.'+encodeURIComponent(e)+'&limit=5000&order=id.desc'});const p=await rest('purchases',{query:'?select=*&user_email=eq.'+encodeURIComponent(e)+'&limit=5000&order=id.desc'});if(s.error||p.error){renderList('cloudList',[{type:'ERROR',level:'danger',msg:(s.error||p.error).message}]);return}setLS('ribre_cloud_sales221',s.data||[]);setLS('ribre_cloud_purchases221',p.data||[]);renderList('cloudList',[{type:'売上',msg:'クラウド売上 '+(s.data||[]).length+'件'},{type:'仕入',msg:'クラウド仕入 '+(p.data||[]).length+'件'}])}
function cloudMonthly(){const s=get('ribre_cloud_sales221',[]),p=get('ribre_cloud_purchases221',[]),map={};s.forEach(x=>{const m=x.month||String(x.sale_date||'').slice(0,7)||'未設定';map[m]=map[m]||{s:0,p:0};map[m].s+=num(x.amount)});p.forEach(x=>{const m=x.month||String(x.purchase_date||'').slice(0,7)||'未設定';map[m]=map[m]||{s:0,p:0};map[m].p+=num(x.total||x.cost)});renderList('cloudList',Object.keys(map).sort().reverse().map(m=>({type:m,msg:'売上 '+yen(map[m].s)+' / 仕入 '+yen(map[m].p)+' / 利益 '+yen(map[m].s-map[m].p)})))}
window.addEventListener('load',()=>{const c=sb();if(c.url)document.getElementById('sbUrl').value=c.url;if(c.key)document.getElementById('sbKey').value=c.key;refreshAll();monthlySummary()})
</script>
