<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>株式会社RIBRE 共有ファイル</title>
<style>
  :root{
    --bg:#F5F6F4; --card:#FFFFFF; --border:#E4E7E3;
    --text:#1F2A24; --muted:#6B7A72;
    --accent:#0B6E4F; --accent-light:#E3F0EA;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"BIZ UDPGothic","Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--text); padding:24px 16px 60px;
  }
  .wrap{max-width:760px; margin:0 auto;}
  h1{font-size:20px; margin:0 0 6px; color:var(--accent);}
  .desc{color:var(--muted); font-size:13px; margin-bottom:24px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; margin-bottom:16px;
  }
  .month-title{font-size:15px; font-weight:700; margin:0 0 10px; color:var(--text);}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left; padding:8px 6px; border-bottom:1px solid var(--border);
    color:var(--muted); font-weight:500; font-size:12px;
  }
  td{padding:10px 6px; border-bottom:1px solid var(--border); vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  a.file-link{color:var(--accent); text-decoration:none; font-weight:600; word-break:break-all;}
  a.file-link:hover{text-decoration:underline;}
  .muted{color:var(--muted);}
  #status{color:var(--muted); font-size:13.5px; padding:20px 0;}
  #status.error{color:#B3261E;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>株式会社RIBRE 共有ファイル</h1>
    <div class="desc">ファイル名をクリックするとダウンロードできます。</div>
    <div id="status">読み込み中…</div>
    <div id="list"></div>
  </div>
  <script src="pages/tax-share.js"></script>
</body>
</html>
