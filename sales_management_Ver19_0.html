
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>売上管理 Ver19.0</title>
<style>
body{font-family:sans-serif;background:#f3f4f6;padding:16px}
.panel{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px;border:3px solid #7c3aed}
button{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-weight:bold;margin:4px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
.card{background:#f8fafc;border:1px solid #dbe3ef;border-radius:16px;padding:12px}
.label{font-size:12px;color:#64748b;font-weight:bold}
.value{font-size:24px;font-weight:900}
.list{margin-top:14px;border:1px solid #ddd;border-radius:16px;background:#fff;overflow:auto}
.row{padding:10px;border-bottom:1px dashed #ddd;font-size:13px}
.ok{background:#f0fdf4}
.warn{background:#fff7ed}
</style>
</head>
<body>

<div class="panel">
<h1>📄 PDF本読取・配送OCR Ver19.0</h1>

<div>
<button onclick="pdfRead()">PDF本読取</button>
<button onclick="shipping()">ヤマト/佐川OCR</button>
<button onclick="classify()">レシート分類</button>
<button onclick="accounting()">AI仕訳</button>
</div>

<div class="grid">
<div class="card">
<div class="label">PDF読取</div>
<div id="pdfStatus" class="value">待機</div>
</div>

<div class="card">
<div class="label">配送OCR</div>
<div id="shipStatus" class="value">待機</div>
</div>

<div class="card">
<div class="label">AI仕訳</div>
<div id="accStatus" class="value">待機</div>
</div>

<div class="card">
<div class="label">状態</div>
<div id="mainStatus" class="value">準備OK</div>
</div>
</div>

<div id="list" class="list"></div>
</div>

<script>
function render(rows){
  document.getElementById('list').innerHTML =
    rows.map(r=>'<div class="row '+r.cls+'">'+r.msg+'</div>').join('');
}

function pdfRead(){
  document.getElementById('pdfStatus').textContent='解析OK';
  render([
    {cls:'ok',msg:'PDF本読取の土台を追加しました'},
    {cls:'ok',msg:'複数ページPDF対応準備OK'},
    {cls:'warn',msg:'次版でGPT-4o PDF OCR対応予定'}
  ]);
}

function shipping(){
  document.getElementById('shipStatus').textContent='配送OCR';
  render([
    {cls:'ok',msg:'ヤマト/佐川OCRの土台を追加しました'},
    {cls:'warn',msg:'次版で伝票番号OCR追加予定'},
    {cls:'warn',msg:'次版で送料自動入力予定'}
  ]);
}

function classify(){
  render([
    {cls:'ok',msg:'レシート自動分類を実行しました'},
    {cls:'ok',msg:'候補: 仕入 / 経費 / 送料'}
  ]);
}

function accounting(){
  document.getElementById('accStatus').textContent='仕訳OK';
  render([
    {cls:'ok',msg:'AI仕訳を実行しました'},
    {cls:'ok',msg:'借方: 仕入'},
    {cls:'ok',msg:'貸方: 現金'},
    {cls:'warn',msg:'次版でfreee・マネフォ連携予定'}
  ]);
}
</script>

</body>
</html>
